services:
  # Backend (Django)
  - type: web
    name: wooden-hut-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn Backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  # Frontend (React)
  - type: web
    name: wooden-hut-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html